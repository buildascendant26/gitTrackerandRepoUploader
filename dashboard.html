<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ascendant 2026 — Repo Tracker Dashboard</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #000000;
    --bg-panel: #0c0c0c;
    --border-subtle: rgba(255, 255, 255, 0.09);
    --text-primary: #f2f2f2;
    --text-muted: #9a9a9a;
    --ctf: #16c794;
    --ctf-rgb: 22, 199, 148;
    --danger: #ff5f57;
    --font-display: 'Anton', 'Arial Narrow', sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    --radius: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    position: relative;
    min-height: 100vh;
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: var(--font-body);
    padding: 32px;
    overflow-x: hidden;
  }
  .matrix-canvas {
    position: fixed; inset: 0; width: 100vw; height: 100vh; display: block;
    z-index: 0; pointer-events: none;
  }
  .bg-vignette {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, transparent 0%, #000 85%);
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255, 255, 255, 0.015) 2px,
      rgba(255, 255, 255, 0.015) 4px
    );
  }
  #gate, #board { position: relative; z-index: 2; }
  h1 { font-family: var(--font-display); color: var(--ctf); font-size: 28px; margin-bottom: 4px; }
  .meta { color: var(--text-muted); font-size: 12px; margin-bottom: 20px; }
  #refresh-btn {
    background: var(--ctf); border: none; border-radius: var(--radius); color: #001510;
    font-family: var(--font-mono); font-weight: 700; font-size: 13px; padding: 10px 18px; cursor: pointer; margin-bottom: 20px;
  }
  #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #release-btn {
    background: transparent; border: 1px solid var(--danger); border-radius: var(--radius); color: var(--danger);
    font-family: var(--font-mono); font-weight: 700; font-size: 13px; padding: 10px 18px; cursor: pointer; margin-bottom: 20px; margin-left: 8px;
  }
  #release-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border-subtle); }
  th { color: var(--text-muted); text-transform: uppercase; font-size: 11px; letter-spacing: 0.04em; font-family: var(--font-mono); }
  tr.flagged { background: rgba(255, 95, 87, 0.08); }
  .chip { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; }
  .chip-pre { background: rgba(255,255,255,0.08); color: var(--text-muted); }
  .chip-post { background: rgba(var(--ctf-rgb), 0.16); color: var(--ctf); }
  .chip-flag { background: rgba(255,95,87,0.16); color: var(--danger); font-weight: 700; }
  .row-error { color: var(--danger); font-style: italic; }
  a { color: var(--ctf); }
  #status { margin-bottom: 12px; font-size: 13px; min-height: 18px; }
  #status.error { color: var(--danger); }
  #auto-note { color: var(--text-muted); font-size: 11px; font-family: var(--font-mono); margin-bottom: 12px; }
  #auto-note .live-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--ctf); margin-right: 6px; vertical-align: middle; animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }

  /* clickable team name -> expandable commit detail */
  td.team-cell { cursor: pointer; user-select: none; }
  td.team-cell .team-name { color: var(--ctf); border-bottom: 1px dotted rgba(var(--ctf-rgb), 0.5); }
  td.team-cell .caret { display: inline-block; width: 10px; color: var(--text-muted); transition: transform 0.15s; margin-right: 4px; }
  tr.expanded td.team-cell .caret { transform: rotate(90deg); }
  tr.detail-row > td { background: #070707; padding: 0 12px 14px 36px; }
  .commit-list { width: 100%; border-collapse: collapse; font-size: 12px; }
  .commit-list th, .commit-list td { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 7px 10px; }
  .commit-list th { font-size: 10px; }
  .commit-msg { font-family: var(--font-mono); color: var(--text-primary); }
  .commit-sha { font-family: var(--font-mono); color: var(--text-muted); font-size: 11px; }
  .commit-empty { color: var(--text-muted); font-style: italic; padding: 10px; }

  /* toast notifications */
  #toast-wrap { position: fixed; top: 20px; right: 20px; z-index: 50; display: flex; flex-direction: column; gap: 10px; max-width: 340px; }
  .toast {
    background: var(--bg-panel); border: 1px solid var(--ctf); border-left: 3px solid var(--ctf);
    border-radius: var(--radius); padding: 12px 14px; font-size: 13px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    animation: toastIn 0.25s ease; cursor: pointer;
  }
  .toast.kind-repo { border-color: #ffb020; border-left-color: #ffb020; }
  .toast .toast-title { font-family: var(--font-mono); font-weight: 700; margin-bottom: 3px; }
  .toast.kind-repo .toast-title { color: #ffb020; }
  .toast.kind-commit .toast-title { color: var(--ctf); }
  .toast .toast-body { color: var(--text-muted); font-size: 12px; }
  .toast .toast-time { color: var(--text-muted); font-size: 10px; margin-top: 5px; font-family: var(--font-mono); }
  @keyframes toastIn { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<canvas id="matrix" class="matrix-canvas" aria-hidden="true"></canvas>
<div class="bg-vignette" aria-hidden="true"></div>
<div id="toast-wrap" aria-live="polite"></div>
<div id="gate">
  <h1>REPO TRACKER</h1>
  <p class="meta">Enter the dashboard secret to continue.</p>
  <input id="secret-input" type="password" placeholder="secret" style="background:var(--bg-panel); border:1px solid var(--border-subtle); border-radius:var(--radius); color:var(--text-primary); font-family:var(--font-mono); padding:10px 12px; margin-right:8px;">
  <button id="unlock-btn" style="background:var(--ctf); border:none; border-radius:var(--radius); color:#001510; font-family:var(--font-mono); font-weight:700; padding:10px 16px; cursor:pointer;">UNLOCK</button>
  <div id="gate-status" style="margin-top:12px; color:var(--danger); font-size:13px;"></div>
</div>

<div id="board" style="display:none;">
  <h1>REPO TRACKER</h1>
  <p class="meta" id="release-meta"></p>
  <button id="refresh-btn">↻ REFRESH</button>
  <button id="release-btn">⚑ RELEASE PROBLEM STATEMENT</button>
  <div id="auto-note"><span class="live-dot"></span>Live — auto-refreshes every 60s. Click a team name to see its commits.</div>
  <div id="status"></div>
  <table>
    <thead>
      <tr>
        <th>Team</th>
        <th>Members</th>
        <th>Repo</th>
        <th>Total</th>
        <th>Before / After</th>
        <th>Contributors</th>
        <th>Last commit</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<script>
  var ENDPOINT = 'https://script.google.com/macros/s/AKfycbyVGTtaReZcoPd8qbTa8aHtEPPMbHVZtNS7QIgAGH_pBvq0gynDr9hWdy5ejMDvTVUs/exec';
  var secret = sessionStorage.getItem('repoTrackerSecret') || '';

  var gateEl = document.getElementById('gate');
  var boardEl = document.getElementById('board');
  var statusEl = document.getElementById('status');
  var tableBody = document.getElementById('table-body');
  var releaseMetaEl = document.getElementById('release-meta');
  var toastWrap = document.getElementById('toast-wrap');

  var currentTeams = [];          // latest teams payload, for rendering commit detail on demand
  var releaseTs = null;           // release timestamp (ms) or null
  var expanded = {};              // team name -> true when its commit list is open
  var autoTimer = null;           // setInterval handle for live refresh

  // Per-team commit counts seen on the previous poll, persisted so a page
  // reload doesn't re-announce everything. null = never seen -> seed silently.
  var SNAP_KEY = 'repoTrackerSnapshot';
  function loadSnapshot() {
    try { return JSON.parse(localStorage.getItem(SNAP_KEY)) || null; }
    catch (e) { return null; }
  }
  function saveSnapshot(snap) {
    try { localStorage.setItem(SNAP_KEY, JSON.stringify(snap)); } catch (e) {}
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  function showToast(kind, title, body) {
    var el = document.createElement('div');
    el.className = 'toast kind-' + kind;
    el.innerHTML =
      '<div class="toast-title">' + escapeHtml(title) + '</div>' +
      '<div class="toast-body">' + escapeHtml(body) + '</div>' +
      '<div class="toast-time">' + new Date().toLocaleTimeString() + '</div>';
    el.addEventListener('click', function () { el.remove(); });
    toastWrap.appendChild(el);
    setTimeout(function () { el.remove(); }, 12000);

    if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
      try { new Notification(title, { body: body }); } catch (e) {}
    }
  }

  // Compare this poll against the last snapshot and toast anything new.
  function notifyChanges(teams) {
    var prev = loadSnapshot();
    var next = {};
    teams.forEach(function (t) {
      next[t.team] = (t.status === 'ok') ? t.totalCommits : -1;
    });

    if (prev !== null) {
      teams.forEach(function (t) {
        var cur = next[t.team];
        if (!(t.team in prev)) {
          showToast('repo', 'New repo submitted', t.team + ' just joined the tracker.');
        } else if (typeof prev[t.team] === 'number' && cur > prev[t.team] && prev[t.team] >= 0) {
          var delta = cur - prev[t.team];
          showToast('commit', delta + ' new commit' + (delta === 1 ? '' : 's'), t.team + ' — now ' + cur + ' total.');
        }
      });
    }
    saveSnapshot(next);
  }

  function teamNameCell(t, clickable) {
    if (!clickable) return '<td>' + escapeHtml(t.team) + '</td>';
    return '<td class="team-cell" data-team="' + escapeHtml(t.team) + '">' +
      '<span class="caret">▸</span>' + // CSS rotates it when the row is expanded
      '<span class="team-name">' + escapeHtml(t.team) + '</span></td>';
  }

  function buildDetailRow(t) {
    var tr = document.createElement('tr');
    tr.className = 'detail-row';
    var commits = t.commits || [];
    var inner;
    if (!commits.length) {
      inner = '<div class="commit-empty">No commits fetched for this repo.</div>';
    } else {
      var rows = commits.map(function (c) {
        var firstLine = (c.message || '').split('\n')[0] || '(no message)';
        var isPost = releaseTs !== null && new Date(c.date).getTime() >= releaseTs;
        var chip = releaseTs === null ? '' :
          '<span class="chip ' + (isPost ? 'chip-post' : 'chip-pre') + '">' + (isPost ? 'after' : 'before') + '</span>';
        return '<tr>' +
          '<td class="commit-sha">' + escapeHtml((c.sha || '').slice(0, 7)) + '</td>' +
          '<td class="commit-msg" title="' + escapeHtml(c.message || '') + '">' + escapeHtml(firstLine) + '</td>' +
          '<td>' + escapeHtml(c.author) + '</td>' +
          '<td>' + (c.date ? new Date(c.date).toLocaleString() : '—') + '</td>' +
          '<td>' + chip + '</td>' +
          '</tr>';
      }).join('');
      inner =
        '<table class="commit-list"><thead><tr>' +
        '<th>SHA</th><th>Commit message</th><th>Author</th><th>When</th><th>Phase</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table>';
    }
    tr.innerHTML = '<td colspan="7">' + inner + '</td>';
    return tr;
  }

  function renderTeams(teams) {
    tableBody.innerHTML = '';
    teams.forEach(function (t) {
      var tr = document.createElement('tr');
      if (t.status === 'error') {
        tr.innerHTML =
          teamNameCell(t, false) +
          '<td>' + escapeHtml(t.members) + '</td>' +
          '<td><a href="' + escapeHtml(t.repoUrl) + '" target="_blank" rel="noopener">' + escapeHtml(t.repoUrl) + '</a></td>' +
          '<td class="row-error" colspan="4">' + escapeHtml(t.message) + '</td>';
        tableBody.appendChild(tr);
      } else {
        if (t.postRelease === 0) tr.className = 'flagged';
        if (expanded[t.team]) tr.className += ' expanded';
        tr.innerHTML =
          teamNameCell(t, true) +
          '<td>' + escapeHtml(t.members) + '</td>' +
          '<td><a href="' + escapeHtml(t.repoUrl) + '" target="_blank" rel="noopener">' + escapeHtml(t.repoUrl) + '</a></td>' +
          '<td>' + t.totalCommits + '</td>' +
          '<td><span class="chip chip-pre">' + t.preRelease + ' before</span> ' +
            '<span class="chip ' + (t.postRelease === 0 ? 'chip-flag' : 'chip-post') + '">' + t.postRelease + ' after</span></td>' +
          '<td>' + t.contributorCount + '</td>' +
          '<td>' + (t.lastCommitTime ? new Date(t.lastCommitTime).toLocaleString() : '—') + '</td>';
        tableBody.appendChild(tr);
        if (expanded[t.team]) tableBody.appendChild(buildDetailRow(t));
      }
    });
  }

  tableBody.addEventListener('click', function (evt) {
    var cell = evt.target.closest ? evt.target.closest('td.team-cell') : null;
    if (!cell) return;
    var name = cell.getAttribute('data-team');
    expanded[name] = !expanded[name];
    renderTeams(currentTeams);
  });

  function loadDashboard(silent) {
    if (!silent) { statusEl.textContent = 'Loading...'; statusEl.className = ''; }
    var url = ENDPOINT + '?action=dashboard&secret=' + encodeURIComponent(secret);
    fetch(url)
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data.status !== 'success') {
          statusEl.textContent = data.message || 'Failed to load.';
          statusEl.className = 'error';
          return;
        }
        statusEl.textContent = '';
        releaseTs = data.releaseTimestamp ? new Date(data.releaseTimestamp).getTime() : null;
        releaseMetaEl.textContent = data.releaseTimestamp
          ? 'Problem statement released: ' + new Date(data.releaseTimestamp).toLocaleString()
          : 'Problem statement not yet released — every commit currently counts as "before".';
        currentTeams = data.teams;
        notifyChanges(data.teams);
        renderTeams(data.teams);
      })
      .catch(function () {
        if (!silent) { statusEl.textContent = 'Network error — try again.'; statusEl.className = 'error'; }
      });
  }

  function startAutoRefresh() {
    if (autoTimer) return;
    autoTimer = setInterval(function () { loadDashboard(true); }, 60000);
  }

  function enterBoard() {
    gateEl.style.display = 'none';
    boardEl.style.display = 'block';
    if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
      try { Notification.requestPermission(); } catch (e) {}
    }
    loadDashboard();
    startAutoRefresh();
  }

  document.getElementById('unlock-btn').addEventListener('click', function () {
    secret = document.getElementById('secret-input').value;
    sessionStorage.setItem('repoTrackerSecret', secret);
    enterBoard();
  });

  document.getElementById('refresh-btn').addEventListener('click', loadDashboard);

  document.getElementById('release-btn').addEventListener('click', function () {
    if (!confirm('Release the problem statement now? Every commit from this moment on will count as "current" instead of "past" for every team. This cannot be undone.')) {
      return;
    }
    var releaseBtn = document.getElementById('release-btn');
    releaseBtn.disabled = true;
    releaseBtn.textContent = 'RELEASING...';
    fetch(ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'release', secret: secret })
    })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        releaseBtn.disabled = false;
        releaseBtn.textContent = '⚑ RELEASE PROBLEM STATEMENT';
        if (data.status !== 'success') {
          statusEl.textContent = data.message || 'Failed to release.';
          statusEl.className = 'error';
          return;
        }
        loadDashboard();
      })
      .catch(function () {
        releaseBtn.disabled = false;
        releaseBtn.textContent = '⚑ RELEASE PROBLEM STATEMENT';
        statusEl.textContent = 'Network error — try again.';
        statusEl.className = 'error';
      });
  });

  if (secret) {
    enterBoard();
  }
</script>
<script src="matrix-bg.js"></script>
</body>
</html>
